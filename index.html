<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- PWA / add-to-home-screen: fullscreen standalone launch. The manifest + app icon are
         injected at runtime (see src/pwa.ts) so the game stays a single self-contained file. -->
    <meta name="theme-color" content="#0a0a12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Plasma Boy" />
    <title>Plasma Boy vs Plantas Monstruo</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2016%2016%22%20shape-rendering%3D%22crispEdges%22%3E%3Crect%20width%3D%2216%22%20height%3D%2216%22%20rx%3D%223%22%20fill%3D%22%235fb7e8%22/%3E%3Crect%20x%3D%223%22%20y%3D%222%22%20width%3D%2210%22%20height%3D%223%22%20fill%3D%22%23ffd54f%22/%3E%3Crect%20x%3D%222%22%20y%3D%223%22%20width%3D%222%22%20height%3D%222%22%20fill%3D%22%23e0a800%22/%3E%3Crect%20x%3D%2212%22%20y%3D%223%22%20width%3D%222%22%20height%3D%222%22%20fill%3D%22%23e0a800%22/%3E%3Crect%20x%3D%224%22%20y%3D%224%22%20width%3D%228%22%20height%3D%226%22%20fill%3D%22%23ffcc99%22/%3E%3Crect%20x%3D%224%22%20y%3D%224%22%20width%3D%222%22%20height%3D%222%22%20fill%3D%22%23ffd54f%22/%3E%3Crect%20x%3D%2210%22%20y%3D%224%22%20width%3D%222%22%20height%3D%222%22%20fill%3D%22%23ffd54f%22/%3E%3Crect%20x%3D%226%22%20y%3D%226%22%20width%3D%221%22%20height%3D%222%22%20fill%3D%22%231a1a2e%22/%3E%3Crect%20x%3D%229%22%20y%3D%226%22%20width%3D%221%22%20height%3D%222%22%20fill%3D%22%231a1a2e%22/%3E%3Crect%20x%3D%223%22%20y%3D%2210%22%20width%3D%2210%22%20height%3D%226%22%20fill%3D%22%237c4dff%22/%3E%3Crect%20x%3D%223%22%20y%3D%2210%22%20width%3D%2210%22%20height%3D%221%22%20fill%3D%22%23ff6f3c%22/%3E%3C/svg%3E" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0a0a12;
        overflow: hidden;
        width: 100%;
        height: 100%;
        position: fixed;
        inset: 0;
        /* Kill mobile browser gestures on the game: no pinch/double-tap zoom, no text selection,
           no long-press callout, no scroll/rubber-band. (iOS ignores user-scalable=no, so these
           plus the gesture handlers in main.ts are what actually stop the zoom/selection.) */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        overscroll-behavior: none;
      }
      /* The game container fills the whole viewport so Phaser can scale the canvas up to it
         (on mobile, RESIZE makes the canvas == the screen; on desktop, FIT letterboxes inside).
         fixed + inset:0 fills including safe-area insets in PWA standalone mode. */
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        image-rendering: pixelated;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
